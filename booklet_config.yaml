# Academic booklet theme — "Parchment & Navy"
# A4 portrait | Libre Baskerville serif | deep navy + garnet on ivory
# Recommended engine: WeasyPrint (CSS paged media, TOC leaders, running headers)

booklet_theme:

  primary_color:           "#1A1A2E"   # deep navy — headings, TOC
  secondary_color:         "#FAFAF8"   # ivory white — page background
  accent_color:            "#F2EDE4"   # parchment — blockquotes, alt rows
  chapter_color:           "#8B0000"   # garnet — h3, accents, inline code
  code_bg_color:           "#1E1E2E"   # dark — code block background
  code_text_color:         "#CDD6F4"   # light blue — code text
  inline_code_bg:          "#EAEAEA"   # light grey — inline code
  caption_color:           "#777777"   # mid grey — captions
  link_color:              "#8B0000"   # garnet — hyperlinks
  border_color:            "#C9B99A"   # warm beige — dividers

  font:      "Libre Baskerville"
  code_font: "'Fira Code', 'Consolas', 'Courier New', monospace"

  font_size_h1:          "26pt"
  font_size_h2:          "17pt"
  font_size_h3:          "13pt"
  font_size_body:        "11pt"
  font_size_list:        "11pt"
  font_size_code:         "9pt"
  font_size_caption:      "9pt"
  font_size_page_number:  "9pt"
  font_size_blockquote:  "11pt"
  font_size_table:       "10pt"

  line_height_body:  1.55
  line_height_list:  1.55

  page_width:         "210mm"
  page_height:        "297mm"
  page_margin_top:     "20mm"
  page_margin_bottom:  "22mm"
  page_margin_left:    "25mm"   # inner margin (binding)
  page_margin_right:   "20mm"

  page_numbering:           true
  toc:                      true
  blockquote_border_width: "4px"
  image_max_width:         "90%"
  image_max_height:       "100mm"

  # PDF engine: weasyprint | wkhtmltopdf | pypandoc
  # WeasyPrint is strongly recommended: it supports CSS paged media
  # (TOC dot leaders, page numbers, running headers via @top-center).
  pdf_engine: "weasyprint"
